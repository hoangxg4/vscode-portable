name: Auto Build VS Code Portable

on:
  schedule:
    - cron: '0 0 * * *' # Chạy tự động kiểm tra mỗi ngày lúc nửa đêm (UTC)
  workflow_dispatch: # Bật nút Run workflow để có thể bấm chạy thủ công

permissions:
  contents: write # Cấp quyền ghi để tạo Release, tự push version.txt và keepalive commit
  actions: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Lấy toàn bộ lịch sử git để tính toán số ngày keepalive chính xác

      - name: Check for updates
        id: check
        run: |
          LATEST_VERSION=$(curl -sL "https://update.code.visualstudio.com/api/releases/stable" | jq -r '.[0]')
          CURRENT_VERSION=$(cat version.txt || echo "0.0.0")
          EVENT_NAME="${{ github.event_name }}"
          
          echo "Latest: $LATEST_VERSION, Current: $CURRENT_VERSION, Event: $EVENT_NAME"
          
          # Bỏ qua check version nếu chạy thủ công bằng nút (workflow_dispatch)
          if [ "$EVENT_NAME" == "workflow_dispatch" ] || [ "$LATEST_VERSION" != "$CURRENT_VERSION" ]; then
            if [ -n "$LATEST_VERSION" ] && [ "$LATEST_VERSION" != "null" ]; then
              echo "should_run=true" >> $GITHUB_OUTPUT
              echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT
              
              # Nếu bản mới thực sự khác bản cũ thì mới commit file version.txt
              if [ "$LATEST_VERSION" != "$CURRENT_VERSION" ]; then
                echo $LATEST_VERSION > version.txt
                git config user.name "github-actions[bot]"
                git config user.email "github-actions[bot]@users.noreply.github.com"
                git add version.txt
                git commit -m "Update VS Code version to $LATEST_VERSION"
                git push
              else
                echo "Chạy thủ công: Phiên bản không đổi, bỏ qua bước commit version.txt."
              fi
            else
              echo "Lỗi: Không lấy được phiên bản từ Microsoft API."
              echo "should_run=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Phiên bản chưa có cập nhật mới. Hủy chạy build."
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Manual Keepalive
        if: steps.check.outputs.should_run == 'false' # Chỉ chạy keepalive nếu không có bản update mới
        run: |
          # Lấy timestamp của commit cuối cùng và timestamp hiện tại
          LAST_COMMIT_TS=$(git log -1 --format=%ct)
          CURRENT_TS=$(date +%s)
          
          # Tính số ngày chênh lệch
          DAYS_SINCE_LAST_COMMIT=$(( (CURRENT_TS - LAST_COMMIT_TS) / 86400 ))
          echo "Số ngày kể từ commit cuối: $DAYS_SINCE_LAST_COMMIT ngày"
          
          # Nếu quá 50 ngày (sắp đến hạn 60 ngày của GitHub) thì tạo một commit trống (empty)
          if [ "$DAYS_SINCE_LAST_COMMIT" -ge 50 ]; then
            echo "Đã 50 ngày không có hoạt động. Tiến hành tạo empty commit để nuôi Cron..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "chore: auto keepalive cron workflow"
            git push
          else
            echo "Chưa tới 50 ngày, chưa cần tạo keepalive commit."
          fi

  build-and-release:
    needs: check-version
    if: needs.check-version.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - os_name: windows
            arch: x64
            url_os: win32-x64-archive
            ext: zip
          - os_name: windows
            arch: arm64
            url_os: win32-arm64-archive
            ext: zip
          # Linux
          - os_name: linux
            arch: x64
            url_os: linux-x64
            ext: tar.gz
          - os_name: linux
            arch: armhf
            url_os: linux-armhf
            ext: tar.gz
          - os_name: linux
            arch: arm64
            url_os: linux-arm64
            ext: tar.gz
          # macOS
          - os_name: macos
            arch: universal
            url_os: darwin-universal
            ext: zip

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Download VS Code
        run: |
          DOWNLOAD_URL="https://update.code.visualstudio.com/latest/${{ matrix.url_os }}/stable"
          echo "Downloading from: $DOWNLOAD_URL"
          curl -sLf "$DOWNLOAD_URL" -o vscode.${{ matrix.ext }}

      - name: Extract & Create Portable Structure
        run: |
          mkdir package
          
          if [ "${{ matrix.ext }}" == "zip" ]; then
            unzip -q vscode.zip -d package/vscode
          else
            mkdir package/vscode
            tar -xzf vscode.tar.gz -C package/vscode --strip-components=1
          fi
          
          if [ "${{ matrix.os_name }}" == "windows" ]; then
            mkdir -p package/vscode/data/tmp
            cp scripts/update.cmd package/vscode/update.cmd
            
          elif [ "${{ matrix.os_name }}" == "linux" ]; then
            mkdir -p package/vscode/data/tmp
            cp scripts/update.sh package/vscode/update.sh
            chmod +x package/vscode/update.sh
            
          elif [ "${{ matrix.os_name }}" == "macos" ]; then
            mkdir -p package/code-portable-data/tmp
            mv package/vscode/Visual\ Studio\ Code.app package/
            rm -rf package/vscode
            cp scripts/update.sh package/update.sh
            chmod +x package/update.sh
          fi

      - name: Repackage
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          FILENAME="VSCode-Portable-${{ matrix.os_name }}-${{ matrix.arch }}-$VERSION"
          
          cd package
          if [ "${{ matrix.ext }}" == "zip" ]; then
            zip -qr ../$FILENAME.zip *
          else
            tar -czf ../$FILENAME.tar.gz *
          fi

      - name: Release to GitHub
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: VS Code Portable v${{ needs.check-version.outputs.version }}
          files: |
            VSCode-Portable-${{ matrix.os_name }}-${{ matrix.arch }}-*.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
